<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | Đẹp Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background-color: var(--soft-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            max-width: 1000px;
            width: 100%;
            min-height: 600px;
            display: flex;
            border-radius: 40px;
            overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: var(--luxury-shadow);
        }

        /* Side Image */
        .auth-image {
            width: 50%;
            background: url('https://images.unsplash.com/photo-1509631179647-0177331693ae?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat;
            position: relative;
        }

        .auth-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
        }

        .auth-form-side {
            width: 50%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255,255,255,0.4);
        }

        .social-login-btn {
            border: 1px solid #eee;
            background: #fff;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-login-btn:hover {
            background: #f8f9fa;
            border-color: var(--primary-gold);
            color: #000;
        }

        @media (max-width: 992px) {
            .auth-image { display: none; }
            .auth-form-side { width: 100%; padding: 40px; }
            .auth-card { max-width: 500px; }
        }
    </style>
</head>
<body>

    <nav class="navbar py-3">
        <div class="container justify-content-center">
            <a class="navbar-brand luxury-font fs-3 fw-bold" href="index.html">ĐẸP BOUTIQUE</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-image">
                <div class="position-absolute bottom-0 start-0 p-5 text-white z-1">
                    <h2 class="luxury-font display-5 mb-0">Hành Trình</h2>
                    <p class="opacity-75">Bắt đầu phong cách riêng của bạn.</p>
                </div>
            </div>

            <div class="auth-form-side">
                <div class="mb-5">
                    <h3 class="luxury-font fs-2 fw-bold mb-2">Chào mừng trở lại!</h3>
                    <p class="text-muted small">Vui lòng đăng nhập để tiếp tục trải nghiệm đặc quyền.</p>
                </div>

                <form>
                    <div class="mb-4">
                        <label class="form-label">Email hoặc Số điện thoại</label>
                        <input type="text" class="form-control-luxury w-100" placeholder="nguyenvana@gmail.com">
                    </div>

                    <div class="mb-2">
                        <label class="form-label d-flex justify-content-between">
                            Mật khẩu
                            <a href="#" class="text-decoration-none small text-muted fw-normal">Quên mật khẩu?</a>
                        </label>
                        <input type="password" class="form-control-luxury w-100" placeholder="••••••••">
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small text-muted" for="remember">Ghi nhớ đăng nhập</label>
                    </div>

                    <a href="index.html"><button type="button" class="btn-send mb-4 ">ĐĂNG NHẬP</button></a>

                    <div class="text-center mb-4 position-relative">
                        <hr class="text-muted">
                        <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-muted">Hoặc</span>
                    </div>

                    <div class="row g-3 mb-5">
                        <div class="col-6">
                            <a href="#" class="social-login-btn">
                                <img src="./img/google.png" width="18"> Google
                            </a>
                        </div>
                        <div class="col-6">
                            <a href="#" class="social-login-btn">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/1280px-Facebook_f_logo_%282019%29.svg.png?utm_source=vi.wikipedia.org&utm_campaign=index&utm_content=thumbnail" width="18"> Facebook
                            </a>
                        </div>
                    </div>

                    <p class="text-center small text-muted mb-0">
                        Bạn chưa có tài khoản? <a href="dang-ky.html" class="fw-bold text-dark text-decoration-none border-bottom border-dark">Đăng ký ngay</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-4 bg-white border-top">
        <div class="container text-center">
            <p class="text-muted small mb-0">© 2026 Đẹp Boutique - Thiết kế cao cấp bởi <b>Nguyễn Khả Doanh</b>.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
